<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="X-Robots-Tag" content="noindex, nofollow">
  <title>404 — Страница не найдена | Санитарные Решения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, hsl(210 25% 97%) 0%, hsl(210 30% 94%) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: hsl(210 25% 25%);
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    .error-code {
      font-size: 120px;
      font-weight: 700;
      color: hsl(207 90% 54%);
      line-height: 1;
      margin-bottom: 16px;
      text-shadow: 2px 2px 0 hsl(207 90% 90%);
    }

    .error-title {
      font-size: 24px;
      font-weight: 600;
      color: hsl(210 25% 20%);
      margin-bottom: 12px;
    }

    .error-description {
      font-size: 16px;
      color: hsl(210 15% 50%);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, hsl(207 90% 54%) 0%, hsl(207 89% 46%) 100%);
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px hsla(207, 90%, 54%, 0.3);
    }

    .home-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px hsla(207, 90%, 54%, 0.4);
    }

    .home-button:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid hsl(210 20% 90%);
    }

    .company-name {
      font-size: 14px;
      font-weight: 600;
      color: hsl(210 25% 30%);
      margin-bottom: 8px;
    }

    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: hsl(207 90% 54%);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .phone-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .error-code {
        font-size: 80px;
      }

      .error-title {
        font-size: 20px;
      }

      .container {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1 class="error-title">Страница не найдена</h1>
    <p class="error-description">
      Возможно, она была удалена или перемещена.<br>
      Проверьте правильность адреса или вернитесь на главную.
    </p>
    <a href="/" class="home-button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Вернуться на главную
    </a>
    <div class="footer">
      <div class="company-name">ООО «Санитарные Решения»</div>
      <a href="tel:+79069989888" class="phone-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
        8 (906) 998-98-88
      </a>
    </div>
  </div>
</body>
</html>
