server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 🚀 Gzip сжатие (улучшенная версия)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;  # Уровень сжатия (1-9, рекомендуется 6)
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript
        application/json 
        application/javascript 
        application/xml+rss 
        application/rss+xml 
        application/atom+xml 
        image/svg+xml 
        application/x-font-ttf 
        application/x-font-opentype 
        application/vnd.ms-fontobject;

    # 🚀 Brotli сжатие (если доступно)
    # Раскомментируйте если в nginx установлен модуль brotli
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    # 🚀 Безопасность headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ========================================
    # Статические файлы — отдаём напрямую
    # ========================================
    
    location = /robots.txt { 
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }
    
    location = /sitemap.xml { 
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }
    
    location = /favicon.ico {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location = /og-image.jpg {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }
    
    location ^~ /.well-known/ { }

    # ========================================
    # 410 Gone — старые WordPress URL
    # ========================================
    
    location ^~ /2022/ { return 410; }
    location ^~ /wp-admin/ { return 410; }
    location ^~ /wp-content/ { return 410; }
    location ^~ /wp-includes/ { return 410; }
    location = /wp-login.php { return 410; }
    location = /xmlrpc.php { return 410; }
    location ^~ /feed/ { return 410; }

    # ========================================
    # 404 — попытки взлома WordPress
    # ========================================
    
    location ^~ /wp-json/ { return 404; }
    location = /wp-cron.php { return 404; }

    # ========================================
    # SPA Fallback только для админки (закрыта от индексации)
    # ========================================
    
    location ^~ /admin/ {
        try_files $uri $uri/ /index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ========================================
    # Статические HTML (блог, услуги, контакты, privacy)
    # Эти правила ищут пререндеренные файлы
    # ========================================
    
    location ~ ^/blog/[^/]+/$ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }
    
    location = /blog/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }
    
    location ~ ^/uslugi/[^/]+/[^/]+/$ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }
    
    location ~ ^/uslugi/[^/]+/$ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }
    
    location ~ ^/uslugi/dezinfekciya-[a-z]+/$ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }
    
    location = /uslugi/po-okrugam-moskvy/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }
    
    location = /contacts/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }
    
    location = /privacy/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }

    # ========================================
    # 🚀 Статические ассеты (JS, CSS, images) — ДОЛГИЙ кеш + Gzip
    # ========================================
    
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;  # Ищет .gz файлы если есть
        try_files $uri $uri.gz =404;
    }
    
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # ========================================
    # Публичные маршруты: ищем реальный файл, иначе 404
    # Это КРИТИЧНО для SEO — не отдаём 200 на мусорных URL!
    # ========================================
    
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "public, max-age=600, stale-while-revalidate=3600";
    }

    # ========================================
    # Кастомные страницы ошибок
    # ========================================
    
    error_page 404 /404.html;
    error_page 410 /410.html;
    
    location = /404.html {
        internal;
    }
    
    location = /410.html {
        internal;
    }
}

