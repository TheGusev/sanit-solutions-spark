server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ========================================
    # Статические файлы — отдаём напрямую
    # ========================================
    location = /robots.txt { 
        add_header Content-Type text/plain;
    }
    location = /sitemap.xml { 
        add_header Content-Type application/xml;
    }
    location = /favicon.ico { }
    location = /og-image.jpg { }
    location ^~ /.well-known/ { }

    # ========================================
    # 410 Gone — старые WordPress URL
    # ========================================
    location ^~ /2022/ {
        return 410;
    }
    location ^~ /wp-admin/ {
        return 410;
    }
    location ^~ /wp-content/ {
        return 410;
    }
    location ^~ /wp-includes/ {
        return 410;
    }
    location = /wp-login.php {
        return 410;
    }
    location = /xmlrpc.php {
        return 410;
    }
    location ^~ /feed/ {
        return 410;
    }

    # ========================================
    # 404 — попытки взлома WordPress
    # ========================================
    location ^~ /wp-json/ {
        return 404;
    }
    location = /wp-cron.php {
        return 404;
    }

    # ========================================
    # Статические HTML (блог, услуги, контакты, privacy)
    # ========================================
    location ~ ^/blog/[^/]+/$ {
        try_files $uri $uri/index.html @spa;
    }
    location = /blog/ {
        try_files $uri $uri/index.html @spa;
    }
    location ~ ^/uslugi/[^/]+/$ {
        try_files $uri $uri/index.html @spa;
    }
    location ~ ^/uslugi/dezinfekciya-[a-z]+/$ {
        try_files $uri $uri/index.html @spa;
    }
    location = /uslugi/po-okrugam-moskvy/ {
    location = /contacts/ {
        try_files $uri $uri/index.html @spa;
    }
    location = /privacy/ {
        try_files $uri $uri/index.html @spa;
    }

    # ========================================
    # Статические ассеты (JS, CSS, images) — долгий кеш
    # ========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ========================================
    # SPA Fallback — все остальные роуты
    # ========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    location @spa {
        try_files /index.html =404;
    }

    # ========================================
    # Кастомные страницы ошибок
    # ========================================
    error_page 404 /404.html;
    error_page 410 /410.html;
    
    location = /404.html {
        internal;
    }
    location = /410.html {
        internal;
    }
}
