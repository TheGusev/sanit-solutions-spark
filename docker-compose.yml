version: '3.8'

services:
  goruslugimsk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goruslugimsk
    ports:
      - "5173:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
