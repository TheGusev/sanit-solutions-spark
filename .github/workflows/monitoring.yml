name: Daily Site Monitoring

on:
  schedule:
    - cron: '0 6 * * *' # 09:00 MSK
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run monitor script
        run: python scripts/monitor.py
        env:
          YANDEX_METRIKA_TOKEN: ${{ secrets.YANDEX_METRIKA_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MONITORING.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(monitoring): daily update MONITORING.md" && git push)
